<body>
<div id="root"><div id="boot"><div class="k">Loading demo</div><div>Causal Impact Playground を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "scipy", "statsmodels", "pandas", "altair"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Causal Impact Playground の Streamlit エントリポイント。\n\nUIのみを担い、推定ロジックは src/ に委譲する。\n\"\"\"\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport altair as alt\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src import DataConfig, did_estimate, generate_panel_data, pre_post_difference\nfrom src.brand import (\n    apply_brand,\n    footer_backlink,\n    hero,\n    section,\n    sidebar_header,\n    themed_altair,\n    show_table,\n)\nfrom src.data import validate_config\nfrom src.estimation import parallel_trends_check\nfrom src.viz import plot_estimate_comparison, plot_group_trends\n\nthemed_altair(alt)\n\nst.set_page_config(\n    page_title=\"Causal Impact Playground\",\n    page_icon=\":bar_chart:\",\n    layout=\"centered\",\n)\n\napply_brand(st)\nhero(\n    st,\n    \"CAUSAL INFERENCE\",\n    \"Causal Impact Playground\",\n    \"施策前後比較・A/Bテスト・DID の違いを合成データで比較し、因果推論と実験設計を体験します。\",\n    chips=[\"Python\", \"statsmodels\", \"Altair\", \"DID\", \"Causal Inference\"],\n)\n\n\n@st.cache_data(show_spinner=False)\ndef _build_dataset(cfg_tuple: tuple) -> pd.DataFrame:\n    \"\"\"キャッシュ付きデータ生成。引数はハッシュ可能なtupleに変換して渡す。\"\"\"\n    cfg = DataConfig(*cfg_tuple)\n    return generate_panel_data(cfg)\n\n\n@st.cache_data(show_spinner=False)\ndef _build_results(cfg_tuple: tuple) -> dict:\n    \"\"\"推定結果一式をキャッシュ付きで構築。入力変化で再計算される。\"\"\"\n    cfg = DataConfig(*cfg_tuple)\n    df = generate_panel_data(cfg)\n    pp = pre_post_difference(df, cfg.true_effect)\n    did = did_estimate(df, cfg.true_effect)\n    slopes = parallel_trends_check(df)\n    return {\n        \"df\": df,\n        \"pre_post\": pp,\n        \"did\": did,\n        \"slopes\": slopes,\n        \"true_effect\": cfg.true_effect,\n    }\n\n\nwith st.sidebar:\n    sidebar_header(st, \"Causal Impact Playground\")\n    st.sidebar.caption(\"データ生成パラメータ\")\n    seed = st.number_input(\"乱数シード（再現性）\", value=42, step=1)\n    n_pre = st.number_input(\"施策前の期間数\", min_value=1, value=5, step=1)\n    n_post = st.number_input(\"施策後の期間数\", min_value=1, value=5, step=1)\n    n_per_cell = st.number_input(\"1セルあたりサンプル数\", min_value=1, value=30, step=1)\n    baseline = st.number_input(\"ベースライン（y切片）\", value=100.0, step=1.0)\n    trend = st.number_input(\"共通トレンド（期ごとの増分）\", value=1.0, step=0.5)\n    group_offset = st.number_input(\"群のレベル差（group_offset）\", value=0.0, step=1.0)\n    trend_diff = st.number_input(\n        \"群別トレンド差（0=平行トレンド成立）\",\n        value=0.0,\n        step=0.5,\n        help=\"0 以外にすると平行トレンド仮定が崩れ、DID にバイアスが入ります。\",\n    )\n    true_effect = st.number_input(\"真の施策効果\", value=5.0, step=1.0)\n    noise_sd = st.number_input(\"ノイズ標準偏差\", min_value=0.0, value=2.0, step=0.5)\n    alpha = st.slider(\"信頼区間の有意水準 (1 - alpha)\", min_value=0.01, max_value=0.20, value=0.05, step=0.01)\n\ncfg = DataConfig(\n    seed=int(seed),\n    n_pre=int(n_pre),\n    n_post=int(n_post),\n    n_per_cell=int(n_per_cell),\n    baseline=float(baseline),\n    trend=float(trend),\n    group_offset=float(group_offset),\n    trend_diff=float(trend_diff),\n    true_effect=float(true_effect),\n    noise_sd=float(noise_sd),\n)\n\n# バリデーション表示（極端値でも落ちない）\nerrors = validate_config(cfg)\nif errors:\n    for msg in errors:\n        st.error(msg)\n    st.stop()\n\ncfg_tuple = (\n    cfg.seed, cfg.n_pre, cfg.n_post, cfg.n_per_cell, cfg.baseline,\n    cfg.trend, cfg.group_offset, cfg.trend_diff, cfg.true_effect, cfg.noise_sd,\n)\n\nbundle = _build_results(cfg_tuple)\ndf: pd.DataFrame = bundle[\"df\"]\npp = bundle[\"pre_post\"]\ndid = bundle[\"did\"]\nslopes = bundle[\"slopes\"]\n\n# --- 群別トレンドグラフ ---\nsection(st, \"TRENDS\", \"群別トレンドグラフ\")\nst.altair_chart(plot_group_trends(df, cfg), width=\"stretch\")\n\n# --- 平行トレンドの診断 ---\nsection(st, \"DIAGNOSTICS\", \"平行トレンドの目安（事前期間）\")\ncol_a, col_b, col_c = st.columns(3)\ncol_a.metric(\"対照群の事前傾き\", f\"{slopes['control_slope']:.2f}\")\ncol_b.metric(\"処置群の事前傾き\", f\"{slopes['treat_slope']:.2f}\")\nslope_gap = abs(slopes[\"treat_slope\"] - slopes[\"control_slope\"])\ncol_c.metric(\"傾きの差\", f\"{slope_gap:.2f}\")\n\nif abs(cfg.trend_diff) > 1e-9:\n    st.warning(\n        \"群別トレンド差が 0 以外です。平行トレンド仮定が崩れているため、\"\n        \"DID 推定量にもバイアスが入ります。下の推定値で bias を確認してください。\"\n    )\nelse:\n    st.success(\"群別トレンド差 = 0。平行トレンド仮定が成立する設定です。\")\n\n# --- 推定結果 ---\nsection(st, \"RESULTS\", \"推定結果（信頼区間付き）\")\nst.altair_chart(plot_estimate_comparison([pp, did]), width=\"stretch\")\n\nrows = [\n    {\n        \"手法\": r.name,\n        \"推定値\": r.estimate,\n        \"標準誤差\": r.se,\n        \"下側CI\": r.ci_lower,\n        \"上側CI\": r.ci_upper,\n        \"真の効果\": r.true_effect,\n        \"バイアス\": r.bias,\n        \"CIが真値を包含\": r.covers_true,\n        \"サンプル数\": r.n_obs,\n    }\n    for r in (pp, did)\n]\nshow_table(st, pd.DataFrame(rows))\n\n# --- 解釈メモ ---\nsection(st, \"MEMO\", \"解釈メモ\")\nst.markdown(\n    f\"\"\"\n- **単純前後差**: 処置群の事後-事前の差。共通トレンドが {cfg.trend:g} のため、\n  真の効果 {cfg.true_effect:g} に対してトレンド分だけ上方バイアスが入りやすい典型例。\n- **DID**: 対照群でトレンドを差し引くことで、平行トレンドが成立すれば真の効果に近づく。\n- 現在の設定: トレンド差 = {cfg.trend_diff:g}、ノイズSD = {cfg.noise_sd:g}、\n  セルサイズ = {cfg.n_per_cell}。\n\"\"\"\n)\n\n# --- 注意（DID 仮定・方法論的注記） ---\nsection(st, \"NOTE\", \"注意事項\")\nst.info(\n    \"DID は平行トレンド仮定の下で成立する手法であり、実際の施策評価では\"\n    \"事前トレンドの検査・共変量バランス・介入タイミングの精査が不可欠です。\"\n    \"ノイズやサンプルサイズによっては信頼区間が真値を外れることもあります。\"\n)\n\nfooter_backlink(st, repo=\"causal-impact-playground\")\n", "src/__init__.py": "\"\"\"因果推論 Playground の推定ロジック。\n\nUI (Streamlit) から独立した純粋関数としてデータ生成・推定を提供する。\n\"\"\"\nfrom __future__ import annotations\n\nfrom .data import DataConfig, generate_panel_data, validate_config\nfrom .estimation import EstimationResult, did_estimate, pre_post_difference\n\n__all__ = [\n    \"DataConfig\",\n    \"generate_panel_data\",\n    \"validate_config\",\n    \"EstimationResult\",\n    \"did_estimate\",\n    \"pre_post_difference\",\n]\n", "src/brand.py": "\"\"\"Portfolio Design System v2 \"Ink & Signal\" — Streamlit 共通ブランドテーマ。\n\nportfolio-hub と12デモで視覚言語を揃える単一ファイル。外部依存なし。\n正典: portfolio-plan/brand/brand.py（各リポの src/brand.py へそのままコピーする）\n仕様: portfolio-plan/design-system.md\n\n各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero, section, sidebar_header, footer_backlink\n    apply_brand(st)                      # set_page_config の後に一度だけ\n    hero(st, \"KICKER\", \"タイトル\", \"サブ説明\", chips=[\"python\", \"altair\"])\n    ...\n    footer_backlink(st, repo=\"rag-eval-dashboard\")\n\nAltair を使うアプリは import 直後に::\n\n    import altair as alt\n    from src.brand import themed_altair\n    themed_altair(alt)\n\nPlotly を使うアプリは figure ごとに::\n\n    fig.update_layout(**plotly_template())\n\"\"\"\n\nfrom __future__ import annotations\n\nPALETTE = [\"#0f766e\", \"#2563eb\", \"#d97706\", \"#be185d\", \"#7c3aed\", \"#64748b\"]\n\n_FONT_BODY = \"'Inter', 'Noto Sans JP', system-ui, sans-serif\"\n_FONT_DISPLAY = \"'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif\"\n_FONT_MONO = \"'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace\"\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');\n/* stlite は Material Symbols を同梱しないため明示ロード（expander 矢印等の豆腐化防止） */\n@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block');\n\n:root {\n  --bg:#f6f7f9; --fg:#0d1526; --muted:#5b6474;\n  --surface:#ffffff;\n  --line:rgba(13,21,38,0.10); --line-strong:rgba(13,21,38,0.20);\n  --accent:#0f766e; --accent-strong:#115e59; --link:#2563eb; --dark:#0b1220;\n  --shadow:0 1px 2px rgba(13,21,38,.05), 0 8px 24px rgba(13,21,38,.06);\n  --shadow-hover:0 2px 4px rgba(13,21,38,.06), 0 16px 40px rgba(13,21,38,.10);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li,\nspan:not([data-testid=\"stIconMaterial\"]):not([class*=\"material-symbols\"]),\nlabel, button, input, textarea, select,\n[data-testid=\"stWidgetLabel\"], [data-testid=\"stMetricLabel\"] {\n  font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;\n}\n/* Material Symbols のリガチャを死守（expander 矢印等） */\n[data-testid=\"stIconMaterial\"], [class*=\"material-symbols\"] {\n  font-family: 'Material Symbols Rounded' !important;\n}\nh1, h2, h3, h4 {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n}\ncode, pre, kbd,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricDelta\"] {\n  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;\n  font-variant-numeric: tabular-nums;\n}\n\n/* 背景：ほぼ無地＋上部にごく薄い teal の気配 */\n.stApp {\n  background:\n    radial-gradient(1200px 480px at 50% -160px, rgba(15,118,110,0.07), transparent 70%),\n    #f6f7f9;\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.4rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 700 !important; letter-spacing: -0.03em; line-height: 1.08; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.02em; color: var(--fg); }\nh3 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 4px 0 34px; }\n.brand-kicker {\n  color: var(--accent); font-size: .75rem; font-weight: 700;\n  letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: clamp(2.1rem, 4.5vw, 3.2rem); font-weight: 700;\n  line-height: 1.08; letter-spacing: -0.03em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n.brand-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }\n.brand-chip {\n  border: 1px solid var(--line); border-radius: 999px; background: var(--surface);\n  padding: 4px 12px; color: var(--muted); font-size: .78rem; font-weight: 600;\n  font-family: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n/* セクション見出し */\n.brand-section { margin: 34px 0 6px; }\n.brand-section .brand-kicker { margin-bottom: 6px; }\n.brand-section-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em;\n  color: var(--fg); margin: 0;\n}\n\n/* サイドバー：不透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: #fbfcfd;\n  border-right: 1px solid var(--line);\n}\n.brand-side-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;\n  color: var(--fg); margin: 2px 0 2px;\n}\n\n/* metric をカード化（左に accent の芯） */\n[data-testid=\"stMetric\"] {\n  background: var(--surface);\n  border: 1px solid var(--line); border-left: 3px solid var(--accent);\n  border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 600; }\n[data-testid=\"stMetricLabel\"] {\n  color: var(--muted); font-size: .74rem; font-weight: 600;\n  letter-spacing: .08em; text-transform: uppercase;\n}\n\n/* ボタン */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 10px; border: 1px solid var(--fg); background: var(--fg);\n  color: #fff; font-weight: 600; padding: 8px 18px;\n  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: var(--dark); border-color: var(--dark); color: #fff;\n  transform: translateY(-1px); box-shadow: var(--shadow);\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 4px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 600; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--accent-strong); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow); background: var(--surface);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 10px !important; }\n\n/* 通知・区切り・リンク */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\na { color: var(--link); }\n\n/* 静的テーブル（st.dataframe の stlite 代替） */\n.brand-table-wrap {\n  overflow-x: auto; border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n.brand-table { width: 100%; border-collapse: collapse; font-size: .88rem; }\n.brand-table th {\n  text-align: left; color: var(--muted); font-size: .72rem; font-weight: 600;\n  letter-spacing: .06em; text-transform: uppercase;\n  padding: 10px 14px; border-bottom: 1px solid var(--line-strong); background: #fbfcfd;\n}\n.brand-table td {\n  padding: 9px 14px; border-bottom: 1px solid var(--line);\n  color: var(--fg); font-variant-numeric: tabular-nums;\n}\n.brand-table tr:last-child td { border-bottom: none; }\n\n/* フッター */\n.brand-footer {\n  margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--line);\n  display: flex; flex-wrap: wrap; gap: 8px 20px;\n  align-items: center; justify-content: space-between;\n  color: var(--muted); font-size: .82rem; line-height: 1.7;\n}\n.brand-footer a { color: var(--accent-strong); font-weight: 600; text-decoration: none; }\n.brand-footer a:hover { text-decoration: underline; }\n</style>\n\"\"\"\n\nHUB_URL = \"https://oishizawads.github.io/portfolio-hub/\"\nGITHUB_OWNER = \"oishizawads\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(\n    st,\n    kicker: str,\n    title: str,\n    subtitle: str | None = None,\n    chips: list[str] | None = None,\n) -> None:\n    \"\"\"ヒーロー見出し（キッカー + 大見出し + サブ説明 + 技術チップ）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    if chips:\n        html += '<div class=\"brand-chips\">'\n        html += \"\".join(f'<span class=\"brand-chip\">{_esc(c)}</span>' for c in chips)\n        html += \"</div>\"\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n\n\ndef section(st, kicker: str, title: str) -> None:\n    \"\"\"本文セクション見出し（kicker + タイトル）。``st.header`` の代替。\"\"\"\n    st.markdown(\n        '<div class=\"brand-section\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-section-title\">{_esc(title)}</div>'\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef sidebar_header(st, title: str, caption: str | None = None) -> None:\n    \"\"\"サイドバー先頭の見出し。\"\"\"\n    html = (\n        '<div class=\"brand-kicker\" style=\"margin-top:4px\">Controls</div>'\n        f'<div class=\"brand-side-title\">{_esc(title)}</div>'\n    )\n    st.sidebar.markdown(html, unsafe_allow_html=True)\n    if caption:\n        st.sidebar.caption(caption)\n\n\ndef footer_backlink(st, repo: str | None = None) -> None:\n    \"\"\"合成データ注記と Portfolio Hub への戻りリンクを持つ共通フッター。\"\"\"\n    links = f'<a href=\"{HUB_URL}\">← Portfolio Hub</a>'\n    if repo:\n        links += (\n            f' &nbsp; <a href=\"https://github.com/{GITHUB_OWNER}/{_esc(repo)}\">'\n            \"GitHub ↗</a>\"\n        )\n    st.markdown(\n        '<div class=\"brand-footer\">'\n        \"<span>Synthetic data demo — 数値はすべて合成データで、実在の精度・効果を示しません。</span>\"\n        f\"<span>{links}</span>\"\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef show_table(st, df, hide_index: bool = True, float_fmt: str | None = None) -> None:\n    \"\"\"静的 HTML テーブルとして描画する。\n\n    stlite 1.8 系では st.dataframe（glide-data-grid）が空描画になるため、\n    デモの一覧表示はこのヘルパーで代替する。\n    \"\"\"\n    data = df.copy()\n    if float_fmt:\n        for col in data.columns:\n            if getattr(data[col].dtype, \"kind\", \"\") == \"f\":\n                data[col] = data[col].map(lambda v: float_fmt.format(v))\n    html = data.to_html(index=not hide_index, classes=\"brand-table\", border=0)\n    st.markdown(f'<div class=\"brand-table-wrap\">{html}</div>', unsafe_allow_html=True)\n\n\ndef altair_config() -> dict:\n    \"\"\"ブランド仕様の Altair テーマ設定を返す。\"\"\"\n    return {\n        \"config\": {\n            \"background\": \"transparent\",\n            \"font\": _FONT_BODY,\n            \"range\": {\"category\": PALETTE},\n            \"axis\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n                \"titleFontWeight\": 600,\n                \"labelFontSize\": 12,\n                \"titleFontSize\": 12,\n                \"gridColor\": \"rgba(13,21,38,0.08)\",\n                \"domainColor\": \"rgba(13,21,38,0.20)\",\n                \"tickColor\": \"rgba(13,21,38,0.20)\",\n            },\n            \"legend\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n            },\n            \"title\": {\n                \"font\": _FONT_DISPLAY,\n                \"color\": \"#0d1526\",\n                \"fontSize\": 15,\n                \"fontWeight\": 700,\n                \"anchor\": \"start\",\n            },\n            \"view\": {\"stroke\": \"transparent\"},\n            \"bar\": {\"color\": PALETTE[0]},\n            \"line\": {\"color\": PALETTE[0], \"strokeWidth\": 2.5},\n            \"point\": {\"color\": PALETTE[0], \"filled\": True, \"size\": 70},\n            \"area\": {\"color\": PALETTE[0], \"opacity\": 0.16, \"line\": True},\n            \"rule\": {\"color\": \"#5b6474\"},\n        }\n    }\n\n\ndef themed_altair(alt) -> None:\n    \"\"\"Altair にブランドテーマを登録して有効化する（バージョン差異を吸収）。\"\"\"\n    theme = altair_config\n\n    try:  # altair >= 5.5\n        alt.theme.register(\"brand\", enable=True)(theme)\n        return\n    except Exception:\n        pass\n    try:  # altair < 5.5\n        alt.themes.register(\"brand\", theme)\n        alt.themes.enable(\"brand\")\n    except Exception:\n        pass\n\n\ndef set_plotly_theme() -> None:\n    \"\"\"plotly express が色を焼き込む前にブランドテンプレートを既定化する。\n\n    figure 生成より前（import 直後）に一度だけ呼ぶ。\n    \"\"\"\n    import plotly.graph_objects as go\n    import plotly.io as pio\n\n    pio.templates[\"brand\"] = go.layout.Template(layout=plotly_template())\n    pio.templates.default = \"plotly_white+brand\"\n\n\ndef plotly_template() -> dict:\n    \"\"\"``fig.update_layout(**plotly_template())`` で適用する共通レイアウト。\"\"\"\n    grid = \"rgba(13,21,38,0.08)\"\n    zero = \"rgba(13,21,38,0.20)\"\n    return {\n        \"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\", \"color\": \"#0d1526\", \"size\": 13},\n        \"paper_bgcolor\": \"rgba(0,0,0,0)\",\n        \"plot_bgcolor\": \"rgba(0,0,0,0)\",\n        \"colorway\": PALETTE,\n        \"xaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"yaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"legend\": {\"bgcolor\": \"rgba(0,0,0,0)\"},\n        \"margin\": {\"t\": 48, \"r\": 16, \"b\": 48, \"l\": 56},\n        \"hoverlabel\": {\"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\"}},\n    }\n", "src/data.py": "\"\"\"合成パネルデータの生成。\n\n処置群と対照群、施策前後の期間を持つ個体レベルの合成データを生成する。\n真の効果 (true_effect) は処置群の事後期間にのみ加算される。\ntrend_diff != 0 のとき平行トレンド仮定が崩れる。\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\nimport pandas as pd\n\n\n@dataclass(frozen=True)\nclass DataConfig:\n    \"\"\"合成データ生成パラメータ。\"\"\"\n\n    seed: int = 42\n    n_pre: int = 5\n    n_post: int = 5\n    n_per_cell: int = 30\n    baseline: float = 100.0\n    trend: float = 1.0\n    group_offset: float = 0.0\n    trend_diff: float = 0.0\n    true_effect: float = 5.0\n    noise_sd: float = 2.0\n    # 事前/事後の期間長。n_pre + n_post が全期間長。\n    periods: tuple[int, ...] = field(default_factory=tuple)\n\n    @property\n    def n_periods(self) -> int:\n        return self.n_pre + self.n_post\n\n\ndef validate_config(cfg: DataConfig) -> list[str]:\n    \"\"\"パラメータの入力値バリデーション。問題メッセージのリストを返す（空ならOK）。\"\"\"\n    errors: list[str] = []\n    if cfg.n_pre < 1:\n        errors.append(\"施策前の期間数は 1 以上にしてください。\")\n    if cfg.n_post < 1:\n        errors.append(\"施策後の期間数は 1 以上にしてください。\")\n    if cfg.n_per_cell < 1:\n        errors.append(\"1セルあたりのサンプル数は 1 以上にしてください。\")\n    if cfg.noise_sd < 0:\n        errors.append(\"ノイズ標準偏差は 0 以上にしてください。\")\n    if not np.isfinite(cfg.baseline):\n        errors.append(\"ベースラインに有限な数値を指定してください。\")\n    if not np.isfinite(cfg.true_effect):\n        errors.append(\"真の効果に有限な数値を指定してください。\")\n    if not np.isfinite(cfg.noise_sd):\n        errors.append(\"ノイズ標準偏差に有限な数値を指定してください。\")\n    return errors\n\n\ndef generate_panel_data(cfg: DataConfig) -> pd.DataFrame:\n    \"\"\"DataConfig から個体レベルのパネルデータを生成する。\n\n    モデル: y = baseline + trend*t + group_offset*treat + trend_diff*treat*t\n            + true_effect*treat*post + N(0, noise_sd)\n    \"\"\"\n    errors = validate_config(cfg)\n    if errors:\n        raise ValueError(\"; \".join(errors))\n\n    rng = np.random.default_rng(cfg.seed)\n    rows: list[dict[str, float]] = []\n    t_index = np.arange(cfg.n_periods)\n    post_mask = t_index >= cfg.n_pre\n\n    for treat in (0, 1):\n        for t in t_index:\n            post = int(post_mask[t])\n            mean = (\n                cfg.baseline\n                + cfg.trend * t\n                + cfg.group_offset * treat\n                + cfg.trend_diff * treat * t\n                + cfg.true_effect * treat * post\n            )\n            sd = cfg.noise_sd if cfg.noise_sd > 0 else 0.0\n            draws = rng.normal(loc=mean, scale=sd, size=cfg.n_per_cell)\n            for y in draws:\n                rows.append(\n                    {\n                        \"y\": float(y),\n                        \"treat\": treat,\n                        \"time\": int(t),\n                        \"post\": post,\n                        \"group\": \"処置群\" if treat == 1 else \"対照群\",\n                        \"period\": \"事後\" if post else \"事前\",\n                    }\n                )\n\n    return pd.DataFrame(rows)\n", "src/estimation.py": "\"\"\"推定ロジック: 単純前後差と DID。\n\n処置群のみの前後差（トレンドを効果に混入するバイアス例）と、\n対照群を用いた Difference-in-Differences (DID) を OLS で推定し、\n信頼区間付きで返す。\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\nimport pandas as pd\nimport statsmodels.formula.api as smf\n\n\n@dataclass(frozen=True)\nclass EstimationResult:\n    \"\"\"推定結果と診断量。\"\"\"\n\n    name: str\n    estimate: float\n    se: float\n    ci_lower: float\n    ci_upper: float\n    true_effect: float\n    n_obs: int\n\n    @property\n    def bias(self) -> float:\n        \"\"\"推定値と真の効果の差（バイアス）。\"\"\"\n        return float(self.estimate - self.true_effect)\n\n    @property\n    def covers_true(self) -> bool:\n        \"\"\"信頼区間が真の効果を含むか。\"\"\"\n        return bool(self.ci_lower <= self.true_effect <= self.ci_upper)\n\n\ndef _empty_result(name: str, true_effect: float, message: str = \"\") -> EstimationResult:\n    \"\"\"推定不能時の空結果（UI が落ちないようにする）。\"\"\"\n    nan = float(\"nan\")\n    return EstimationResult(\n        name=f\"{name}（{message}未推定）\" if message else f\"{name}（未推定）\",\n        estimate=nan,\n        se=nan,\n        ci_lower=nan,\n        ci_upper=nan,\n        true_effect=true_effect,\n        n_obs=0,\n    )\n\n\ndef pre_post_difference(df: pd.DataFrame, true_effect: float, alpha: float = 0.05) -> EstimationResult:\n    \"\"\"処置群のみの前後差を OLS で推定する。\n\n    y ~ post （処置群のサブセット）。post 係数 = 前後差。\n    トレンドが存在するときこの推定値は真の効果からバイアスされる。\n    \"\"\"\n    treat_df = df.query(\"treat == 1\")\n    if treat_df.empty or treat_df[\"post\"].nunique() < 2:\n        return _empty_result(\"単純前後差\", true_effect, \"処置群の前後データ不足・\")\n\n    try:\n        fit = smf.ols(\"y ~ post\", data=treat_df).fit(cov_type=\"HC1\")\n    except Exception:  # 極端パラメータで数値発散した場合\n        return _empty_result(\"単純前後差\", true_effect, \"計算失敗・\")\n\n    ci = fit.conf_int(alpha=alpha).loc[\"post\"]\n    return EstimationResult(\n        name=\"単純前後差（処置群のみ）\",\n        estimate=float(fit.params[\"post\"]),\n        se=float(fit.bse[\"post\"]),\n        ci_lower=float(ci.iloc[0]),\n        ci_upper=float(ci.iloc[1]),\n        true_effect=float(true_effect),\n        n_obs=int(fit.nobs),\n    )\n\n\ndef did_estimate(df: pd.DataFrame, true_effect: float, alpha: float = 0.05) -> EstimationResult:\n    \"\"\"Difference-in-Differences を OLS で推定する。\n\n    y ~ treat*post。treat:post 係数 = DID推定量。\n    平行トレンド仮定が成立すれば真の効果に一致する。\n    \"\"\"\n    if df.empty or df[\"treat\"].nunique() < 2 or df[\"post\"].nunique() < 2:\n        return _empty_result(\"DID\", true_effect, \"群×期間データ不足・\")\n\n    try:\n        fit = smf.ols(\"y ~ treat * post\", data=df).fit(cov_type=\"HC1\")\n    except Exception:\n        return _empty_result(\"DID\", true_effect, \"計算失敗・\")\n\n    key = \"treat:post\"\n    if key not in fit.params.index:\n        return _empty_result(\"DID\", true_effect, \"交互作用項なし・\")\n\n    ci = fit.conf_int(alpha=alpha).loc[key]\n    return EstimationResult(\n        name=\"DID（差の差）\",\n        estimate=float(fit.params[key]),\n        se=float(fit.bse[key]),\n        ci_lower=float(ci.iloc[0]),\n        ci_upper=float(ci.iloc[1]),\n        true_effect=float(true_effect),\n        n_obs=int(fit.nobs),\n    )\n\n\ndef parallel_trends_check(df: pd.DataFrame) -> dict[str, float]:\n    \"\"\"事前期間の群別トレンド傾きを比較し、平行トレンドの目安を返す。\n\n    Returns:\n        事前期間の処置群・対照群それぞれの平均経時変化（近似傾き）。\n    \"\"\"\n    pre = df.query(\"post == 0\")\n    if pre.empty:\n        return {\"treat_slope\": float(\"nan\"), \"control_slope\": float(\"nan\")}\n\n    slopes: dict[str, float] = {}\n    for treat_val, key in ((0, \"control_slope\"), (1, \"treat_slope\")):\n        sub = pre.query(\"treat == @treat_val\")\n        if sub[\"time\"].nunique() < 2:\n            slopes[key] = 0.0\n            continue\n        x = sub[\"time\"].to_numpy(dtype=float)\n        y = sub[\"y\"].to_numpy(dtype=float)\n        slope = float(np.polyfit(x, y, 1)[0]) if x.var() > 0 else 0.0\n        slopes[key] = slope\n\n    return slopes\n", "src/viz.py": "\"\"\"可視化ヘルパー: 群別トレンドグラフと推定結果比較図（Altair 版）。\n\nmatplotlib / japanize-matplotlib を排除し、Altair Chart を返す純粋関数にした。\nstlite (WASM) 環境での日本語豆腐化リスクを排除し、brand テーマと色を統一する。\n\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\nimport pandas as pd\n\ntry:\n    import altair as alt\nexcept ImportError as e:\n    raise ImportError(\"altair が必要です: pip install altair\") from e\n\nfrom .data import DataConfig\nfrom .estimation import EstimationResult\n\n# デザインシステム §1.2 パレット（brand.py の PALETTE と同一）\n_PALETTE = [\"#0f766e\", \"#2563eb\", \"#d97706\", \"#be185d\", \"#7c3aed\", \"#64748b\"]\n\n\ndef plot_group_trends(df: pd.DataFrame, cfg: DataConfig) -> alt.Chart:\n    \"\"\"群別の平均推移グラフ（Altair）。事前/事後を縦線で区切る。\"\"\"\n    if df.empty:\n        placeholder = pd.DataFrame({\"x\": [0.5], \"y\": [0.5], \"text\": [\"データがありません\"]})\n        return (\n            alt.Chart(placeholder)\n            .mark_text(fontSize=14, color=\"#5b6474\")\n            .encode(\n                x=alt.X(\"x:Q\", axis=None),\n                y=alt.Y(\"y:Q\", axis=None),\n                text=alt.Text(\"text:N\"),\n            )\n            .properties(width=\"container\", height=300)\n        )\n\n    summary = df.groupby([\"time\", \"group\"], observed=True)[\"y\"].mean().reset_index()\n\n    line = (\n        alt.Chart(summary)\n        .mark_line(strokeWidth=2.5, point=alt.OverlayMarkDef(filled=True, size=70))\n        .encode(\n            x=alt.X(\"time:Q\", title=\"時間（期）\", axis=alt.Axis(tickMinStep=1, format=\"d\")),\n            y=alt.Y(\"y:Q\", title=\"平均アウトカム y\", scale=alt.Scale(zero=False)),\n            color=alt.Color(\n                \"group:N\",\n                scale=alt.Scale(range=_PALETTE[:2]),\n                legend=alt.Legend(title=\"群\"),\n            ),\n            tooltip=[\n                alt.Tooltip(\"time:Q\", title=\"時間\"),\n                alt.Tooltip(\"group:N\", title=\"群\"),\n                alt.Tooltip(\"y:Q\", title=\"平均アウトカム\", format=\".2f\"),\n            ],\n        )\n    )\n\n    if cfg.n_pre >= 1 and cfg.n_post >= 1:\n        boundary = cfg.n_pre - 0.5\n        rule = (\n            alt.Chart(pd.DataFrame({\"x\": [boundary]}))\n            .mark_rule(color=\"#5b6474\", strokeDash=[6, 3], strokeWidth=1.5)\n            .encode(x=alt.X(\"x:Q\"))\n        )\n        label = (\n            alt.Chart(pd.DataFrame({\"x\": [boundary + 0.1], \"text\": [\"施策導入\"]}))\n            .mark_text(align=\"left\", color=\"#5b6474\", fontSize=11)\n            .encode(\n                x=alt.X(\"x:Q\"),\n                y=alt.value(12),\n                text=alt.Text(\"text:N\"),\n            )\n        )\n        chart = (line + rule + label).properties(\n            title=\"群別トレンド: 施策前後の平均推移\",\n            width=\"container\",\n            height=300,\n        )\n    else:\n        chart = line.properties(\n            title=\"群別トレンド: 施策前後の平均推移\",\n            width=\"container\",\n            height=300,\n        )\n\n    return chart\n\n\ndef plot_estimate_comparison(results: list[EstimationResult]) -> alt.Chart:\n    \"\"\"推定値と真の効果を信頼区間付きで比較するドット図（Altair）。\"\"\"\n    rows = [\n        {\n            \"手法\": r.name,\n            \"推定値\": r.estimate,\n            \"下側CI\": r.ci_lower,\n            \"上側CI\": r.ci_upper,\n        }\n        for r in results\n    ]\n    df = pd.DataFrame(rows)\n    true_eff = results[0].true_effect if results else 0.0\n\n    # NaN/inf を除外して描画\n    df_valid = df[df[\"推定値\"].apply(np.isfinite)].copy()\n\n    points = (\n        alt.Chart(df_valid)\n        .mark_point(filled=True, size=100, color=_PALETTE[0])\n        .encode(\n            y=alt.Y(\"手法:N\", title=None, sort=None, axis=alt.Axis(labelLimit=260)),\n            x=alt.X(\"推定値:Q\", title=\"効果推定値（95% 信頼区間）\"),\n            tooltip=[\n                alt.Tooltip(\"手法:N\"),\n                alt.Tooltip(\"推定値:Q\", format=\".3f\"),\n                alt.Tooltip(\"下側CI:Q\", title=\"CI 下限\", format=\".3f\"),\n                alt.Tooltip(\"上側CI:Q\", title=\"CI 上限\", format=\".3f\"),\n            ],\n        )\n    )\n\n    errorbars = (\n        alt.Chart(df_valid)\n        .mark_errorbar(ticks=True, color=_PALETTE[0])\n        .encode(\n            y=alt.Y(\"手法:N\", sort=None),\n            x=alt.X(\"下側CI:Q\", title=\"効果推定値（95% 信頼区間）\"),\n            x2=alt.X2(\"上側CI:Q\"),\n        )\n    )\n\n    rule = (\n        alt.Chart(pd.DataFrame({\"x\": [true_eff]}))\n        .mark_rule(color=\"#15803d\", strokeDash=[6, 3], strokeWidth=2)\n        .encode(x=alt.X(\"x:Q\"))\n    )\n\n    return (points + errorbars + rule).properties(\n        title=f\"推定値と真の効果の比較（真の効果 = {true_eff:g}）\",\n        width=\"container\",\n        height=200,\n    )\n", ".streamlit/config.toml": "# Portfolio Design System v2 — 共通 Streamlit テーマ（正典: portfolio-plan/brand/config.toml）\n[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f6f7f9\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0d1526\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
